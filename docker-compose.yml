version: '3.8'

services:
  # Microservice IA (Python Flask)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: leadprodos-ai-service
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - FLASK_PORT=5001
      - N_CLUSTERS=5
      - N_NEIGHBORS=3
    volumes:
      - ./ai-service:/app
      - ./ai-service/models:/app/models
    restart: unless-stopped
    networks:
      - leadprodos-network

  # Backend .NET (optionnel - ajuster selon votre configuration)
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: leadprodos-backend
