  #     - ai-service
  #   environment:
  #     - ASPNETCORE_ENVIRONMENT=Development
  #     - AIService__Url=http://ai-service:5001
  #   networks:
  #     - leadprodos-network

networks:
  leadprodos-network:
    driver: bridge
